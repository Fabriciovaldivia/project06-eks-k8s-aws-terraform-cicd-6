name: 🚀 CI-CD-Proyecto06-3Capas

on:
  workflow_dispatch: # Se activa manualmente desde GitHub Actions

jobs:
  build-and-push:
    name: 🏗️ Construir y Subir Imágenes
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - service: frontend
            dockerfile: ./frontend/Dockerfile
            context: ./frontend
          - service: backend
            dockerfile: ./backend/Dockerfile
            context: ./backend
          - service: database
            dockerfile: ./database/Dockerfile
            context: ./database

    steps:
      - name: 📥 Descargar código del repositorio
        uses: actions/checkout@v4

      - name: ✅ Verificar archivos necesarios
        run: |
          echo "Verificando archivos para ${{ matrix.service }}..."
          test -f ${{ matrix.dockerfile }} || (echo "ERROR: Dockerfile no encontrado en ${{ matrix.dockerfile }}" && exit 1)
          test -d ${{ matrix.context }} || (echo "ERROR: Directorio no encontrado ${{ matrix.context }}" && exit 1)
          
          if [ "${{ matrix.service }}" = "database" ]; then
            test -f ${{ matrix.context }}/init.sql || (echo "ERROR: init.sql no encontrado" && exit 1)
          fi
          
          ls -la ${{ matrix.context }}/
          echo "✓ Archivos verificados correctamente"

      - name: 🔐 Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: 🛠️ Crear repositorio ECR si no existe
        run: |
          SERVICE_NAME="proyecto06-${{ matrix.service }}"
          aws ecr describe-repositories --repository-names $SERVICE_NAME --region us-east-1 || \
          aws ecr create-repository --repository-name $SERVICE_NAME --region us-east-1 || echo "Repositorio ya existe"

      - name: 🔑 Autenticarse en Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

      - name: 🏗️ Construir imagen Docker - ${{ matrix.service }}
        run: |
          cd ${{ matrix.context }}
          docker build -t proyecto06-${{ matrix.service }}:latest .
          cd -

      - name: 📦 Etiquetar imagen para ECR - ${{ matrix.service }}
        run: |
          docker tag proyecto06-${{ matrix.service }}:latest \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/proyecto06-${{ matrix.service }}:latest
          docker tag proyecto06-${{ matrix.service }}:latest \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/proyecto06-${{ matrix.service }}:${{ github.sha }}

      - name: 🚀 Subir imagen a Amazon ECR - ${{ matrix.service }}
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/proyecto06-${{ matrix.service }}:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/proyecto06-${{ matrix.service }}:${{ github.sha }}
          echo "Imagen subida correctamente para ${{ matrix.service }}"

  deploy-to-eks:
    name: 🚀 Desplegar en EKS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🔐 Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: 🛠️ Crear Backend S3 y DynamoDB para Terraform
        run: |
          aws s3api head-bucket --bucket proyecto06-terraform-state-eks 2>/dev/null || aws s3api create-bucket --bucket proyecto06-terraform-state-eks --region us-east-1
          aws dynamodb describe-table --table-name proyecto06-terraform-lock-eks --region us-east-1 2>/dev/null || aws dynamodb create-table --table-name proyecto06-terraform-lock-eks --attribute-definitions AttributeName=LockID,AttributeType=S --key-schema AttributeName=LockID,KeyType=HASH --provisioned-throughput ReadCapacityUnits=1,WriteCapacityUnits=1 --region us-east-1

      - name: 🔧 Configurar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 🏗️ Inicializar Terraform
        run: |
          cd terraform
          terraform init -upgrade
          cd ..

      - name: 🚀 Aplicar Terraform
        id: tf_apply
        run: |
          cd terraform
          terraform apply -auto-approve -input=false
          cd ..

      - name: 💣 Rollback Terraform (Limpieza por fallo en creación)
        if: failure() && steps.tf_apply.outcome == 'failure'
        run: |
          echo "⚠️ Terraform falló durante la aplicación. Eliminando recursos incompletos para evitar costos y errores..."
          cd terraform
          
          # Intentar destruir primero. Si falla por "Cluster unreachable", limpiamos el estado.
          if ! terraform destroy -auto-approve -input=false; then
            echo "⚠️ Error al destruir: El cluster Kubernetes podría no ser accesible."
            echo "🧹 Eliminando recursos Helm del estado para forzar la destrucción de la infraestructura..."
            
            # Eliminar del estado los recursos que requieren conexión al cluster
            terraform state rm helm_release.kube_prometheus_stack || true
            terraform state rm helm_release.k8sgpt_operator || true
            
            echo "🔄 Reintentando destrucción de infraestructura AWS..."
            terraform destroy -auto-approve -input=false
          fi
          cd ..

      - name: ✅ Actualizar kubeconfig
        run: |
          echo "Actualizando kubeconfig para cluster proyecto06-eks..."
          aws eks update-kubeconfig --name proyecto06-eks --region us-east-1
          echo "Verificando conexión a Kubernetes..."
          kubectl cluster-info
          kubectl version --client
          echo "✓ Kubeconfig actualizado correctamente"

      - name: ⛑️ Install AWS Load Balancer Controller via Helm
        run: |
          echo "Obteniendo VPC ID..."
          VPC_ID=$(aws eks describe-cluster --name proyecto06-eks --query "cluster.resourcesVpcConfig.vpcId" --output text)
          echo "VPC ID detectado: $VPC_ID"

          echo "Instalando AWS Load Balancer Controller..."
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=proyecto06-eks \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set region=us-east-1 \
            --set vpcId=$VPC_ID \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"="arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/proyecto06-eks-alb-controller-role"

      - name: ⏳ Wait for Load Balancer Controller to be ready
        run: |
          echo "Esperando a que el AWS Load Balancer Controller esté listo..."
          # Usamos rollout status en lugar de wait pod para evitar errores con pods terminando
          kubectl rollout status deployment/aws-load-balancer-controller -n kube-system --timeout=300s
          echo "✓ AWS Load Balancer Controller está listo."

      - name: 📁 Crear namespace y ConfigMap
        run: |
          echo "Creando namespace proyecto06..."
          kubectl apply -f k8s/00-namespace.yaml
          sleep 2
          echo "✓ Namespace creado"

      - name: 🗄️ Desplegar Base de Datos
        run: |
          echo "Desplegando base de datos..."
          kubectl apply -f k8s/01-database.yaml
          echo "Esperando a que la base de datos esté lista (timeout: 5 min)..."
          kubectl wait --for=condition=ready pod -l app=database -n proyecto06 --timeout=300s || echo "⚠️ Timeout, continuando..."
          sleep 10
          kubectl get pods -n proyecto06
          echo "✓ Base de datos desplegada"

      - name: 🔙 Desplegar Backend
        run: |
          echo "Desplegando backend..."
          kubectl apply -f k8s/02-backend.yaml
          echo "Esperando a que el backend esté listo (timeout: 5 min)..."
          kubectl wait --for=condition=ready pod -l app=backend -n proyecto06 --timeout=300s || echo "⚠️ Timeout, continuando..."
          sleep 10
          kubectl get pods -n proyecto06
          echo "✓ Backend desplegado"

      - name: 🎨 Desplegar Frontend
        run: |
          echo "Desplegando frontend..."
          kubectl apply -f k8s/03-frontend.yaml
          echo "Esperando a que el frontend esté listo (timeout: 5 min)..."
          kubectl wait --for=condition=ready pod -l app=frontend -n proyecto06 --timeout=300s || echo "⚠️ Timeout, continuando..."
          sleep 10
          kubectl get pods -n proyecto06
          echo "✓ Frontend desplegado"

      - name: 🌐 Desplegar Ingress
        run: |
          echo "Desplegando Ingress..."
          kubectl apply -f k8s/04-ingress.yaml
          echo "Esperando a que el Load Balancer obtenga una dirección (timeout: 5 min)..."
          # No usamos 'wait' aquí porque el Ingress no tiene una condición 'ready' estándar.
          # Simplemente esperamos un poco y mostramos el estado.
          sleep 60 
          kubectl get ingress -n proyecto06
          echo "✓ Solicitud de Ingress enviada"

      - name: ✨ Obtener URLs de acceso
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════╗"
          echo "║  ✓ DEPLOYMENT COMPLETADO EXITOSAMENTE             ║"
          echo "╚════════════════════════════════════════════════════╝"
          echo ""
          echo "📊 SERVICIOS DESPLEGADOS:"
          echo ""
          echo "🌐 Ingress (Application Load Balancer):"
          kubectl get ingress proyecto06-ingress -n proyecto06 || echo "  (Pendiente de asignación de URL, puede tardar unos minutos)"
          echo ""
          echo "🔙 Backend (ClusterIP):"
          kubectl get svc backend-service -n proyecto06
          echo ""
          echo "🗄️ Database (Headless):"
          kubectl get svc database-service -n proyecto06
          echo ""
          echo "📌 PODS EN EJECUCIÓN:"
          kubectl get pods -n proyecto06 -o wide
          echo ""
          echo "📈 DEPLOYMENTS:"
          kubectl get deployments -n proyecto06
          echo ""
          echo "✓ Pipeline completado exitosamente!"

      - name: 🚨 Rollback Automático por Error
        if: failure() && steps.tf_apply.outcome == 'success'
        run: |
          echo "⚠️ DETECTADO FALLO EN EL PIPELINE - INICIANDO ROLLBACK ⚠️"
          
          # Intentar conectar al cluster (por si el fallo fue posterior a la creación del cluster)
          if aws eks update-kubeconfig --name proyecto06-eks --region us-east-1; then
            echo "✓ Conexión al cluster establecida. Intentando revertir despliegues..."
            
            echo "🔙 Revirtiendo Frontend..."
            kubectl rollout undo deployment/frontend -n proyecto06 || echo "-> No se pudo revertir frontend (quizás es el primer despliegue)"
            
            echo "🔙 Revirtiendo Backend..."
            kubectl rollout undo deployment/backend -n proyecto06 || echo "-> No se pudo revertir backend"
            
            echo "🔙 Revirtiendo Database..."
            kubectl rollout undo statefulset/database -n proyecto06 || echo "-> No se pudo revertir database"
          else
            echo "❌ No se pudo conectar al cluster. El fallo ocurrió antes de tener acceso a Kubernetes o en Terraform."
          fi
